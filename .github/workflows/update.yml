name: update deps

on:
  schedule:
    - cron: "0 5 * * 2"

jobs:
  udpate-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Update dependencies and actions
        run: bun run update
      - name: Update dependency overrides
        run: bun run maintain
      - name: Update lockfile
        run: bun install --ignore-scripts
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PR_CREATE_TOKEN }}
          commit-message: Update dependencies
          title: "[Codependence] update dependencies"
          body: |
            ## Dependency updates
            Auto-generated by [codependence][1] using [create-pull-request][2]
            [1]: https://github.com/yowainwright/yowainwright.github.io
            [2]: https://github.com/peter-evans/create-pull-request
          branch: update-dependencies
          labels: codependencies
