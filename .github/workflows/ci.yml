name: jeffry.in ci 🥤
on:
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - run: bun install --ignore-scripts
      - run: bun run lint
      - run: bun run build
        env:
          CI: true
